name: Build images collection

on:
  push:
    paths:
      - 'images/**'

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run JSON generator
        run: |
          python generate_json.py

      - name: Commit update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add images.json
          git diff --cached --quiet || git commit -m "Update image list"
          git push
