name: Build images collection

on:
  push:
    paths:
      - 'images/**'

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate images_collection.json
        run: |
          cd images
          ls -1 *.jpg *.jpeg *.png *.gif 2>/dev/null | sort | \
          awk '{print "\"" $0 "\""}' | \
          sed '1s/^/[/' | sed '$s/$/]/' | \
          paste -sd, - > ../images_collection.json

      - name: Commit update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add images_collection.json
          git diff --cached --quiet || git commit -m "Update image list"
          git push
